<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fashion Collection</title>
    <link rel="stylesheet" href="fashion.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins&display=swap" rel="stylesheet">
</head>

<body>

    <header class="hero">
        <div class="hero-text">
            <h1>New Season, New Style</h1>
            <p>Explore exclusive fashion for men & women</p>
        </div>
    </header>

    <section class="fashion-section">
        <h2 class="section-title">Featured Collections</h2>
        <div class="fashion-grid">
            <div class="fashion-card">
                <img src="woman fashion.jpg" alt="Women's Fashion">
                <div class="card-overlay">
                    <h3>Women's Fashion</h3>
                    <a href="woman fashion.html">View Collection</a>
                </div>
            </div>

            <div class="fashion-card">
                <img src="mens fashion.jpg" alt="Men's Fashion">
                <div class="card-overlay">
                    <h3>Men's Fashion</h3>
                    <a href="mens fashion.html">View Collection</a>
                </div>
            </div>

            <div class="fashion-card">
                <img src="streetwear fashion.jpg" alt="Streetwear">
                <div class="card-overlay">
                    <h3>Streetwear</h3>
                    <a href="stweetwear.html">View Collection</a>
                </div>
            </div>
        </div>
    </section>

</body>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        font-family: 'Poppins', sans-serif;
        background-color: #fdfdfd;
        color: #333;
    }
    /* Hero Section */
    
    .hero {
        background-image: url(fashion\ hero\ bg.jpg);
        height: 300px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        position: relative;
        color: white;
    }
    
    .hero::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
    }
    
    .hero-text {
        position: relative;
        z-index: 1;
    }
    
    .hero h1 {
        font-family: 'Playfair Display', serif;
        font-size: 3rem;
        margin-bottom: 1rem;
    }
    
    .hero p {
        font-size: 1.2rem;
        margin-bottom: 2rem;
    }
    
    .hero a {
        padding: 0.8rem 2rem;
        background: #ff4081;
        color: white;
        text-decoration: none;
        border-radius: 30px;
        font-weight: bold;
        transition: background 0.3s ease;
    }
    
    .hero a:hover {
        background: #e6005c;
    }
    /* Fashion Section */
    
    .fashion-section {
        padding: 3rem 1.5rem;
        max-width: 1200px;
        margin: auto;
    }
    
    .section-title {
        text-align: center;
        font-size: 2rem;
        margin-bottom: 2rem;
        font-family: 'Playfair Display', serif;
    }
    
    .fashion-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 2rem;
    }
    
    .fashion-card {
        position: relative;
        overflow: hidden;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease;
    }
    
    .fashion-card img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        transition: transform 0.4s ease;
    }
    
    .fashion-card:hover img {
        transform: scale(1.1);
    }
    
    .card-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        opacity: 0;
        transition: opacity 0.4s ease;
    }
    
    .fashion-card:hover .card-overlay {
        opacity: 1;
    }
    
    .card-overlay h3 {
        font-size: 1.8rem;
        margin-bottom: 1rem;
    }
    
    .card-overlay a {
        padding: 0.6rem 1.5rem;
        background: #ff4081;
        color: white;
        text-decoration: none;
        border-radius: 20px;
        font-weight: bold;
    }
    
    .card-overlay a:hover {
        background: #e6005c;
    }
</style>

</html>
