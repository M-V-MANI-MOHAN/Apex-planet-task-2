<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced CSS & JS Interactive Site</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Advanced CSS & JavaScript Site</h1>
        <p>Responsive design, interactive carousel, and API data fetching</p>
    </header>
    <main>
        <section id="carousel">
            <h2>Image Carousel</h2>
            <div class="carousel-container">
                <button id="prev">Previous</button>
                <img id="carousel-image" src="https://picsum.photos/400/300?random=1" alt="Carousel Image">
                <button id="next">Next</button>
            </div>
        </section>
        <section id="api-data">
            <h2>Fetch Data from API</h2>
            <button id="fetch-joke">Get a Random Joke</button>
            <p id="joke"></p>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
